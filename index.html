<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chá de Cozinha - Tata & Pi</title>
    <style>
        /* Design Minimalista Preto e Branco */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            text-align: center;
            line-height: 1.6;
            padding-bottom: 60px;
        }

        /* Topo do Site */
        header {
            background-color: #ffffff;
            padding: 80px 20px 40px 20px;
        }
        header h1 {
            font-size: 2.5rem;
            color: #000000;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 15px;
        }
        header p {
            font-size: 1rem;
            color: #666666;
            max-width: 500px;
            margin: 0 auto;
            letter-spacing: 0.5px;
        }

        /* Container dos Presentes */
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .grid-presentes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
        }

        /* Cards em Preto e Branco */
        .card {
            background: #ffffff;
            border: 1px solid #e5e5e5;
            display: flex;
            flex-direction: column;
            text-align: left;
            transition: border-color 0.2s;
        }
        .card:hover {
            border-color: #000000;
        }
        .card-img-container {
            width: 100%;
            height: 240px;
            background-color: #fafafb;
            overflow: hidden;
            border-bottom: 1px solid #e5e5e5;
        }
        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Aplica efeito preto e branco nas imagens */
            filter: grayscale(100%);
            transition: filter 0.3s;
        }
        .card:hover img {
            filter: grayscale(0%); /* Mostra cor ao passar o mouse, opcional */
        }
        .card-conteudo {
            padding: 24px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }
        .card h3 {
            font-size: 1.1rem;
            color: #000000;
            margin-bottom: 10px;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .card .preco {
            font-size: 1.25rem;
            font-weight: 600;
            color: #000000;
            margin-bottom: 24px;
        }

        /* Botões Sólidos Minimalistas */
        .btn-comprar {
            background-color: #000000;
            color: #ffffff;
            border: 1px solid #000000;
            padding: 16px 20px;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: background 0.2s, color 0.2s;
        }
        .btn-comprar:hover {
            background-color: #ffffff;
            color: #000000;
        }

        /* Items Esgotados */
        .card.comprado {
            opacity: 0.4;
        }
        .card.comprado .btn-comprar {
            background-color: #ffffff !important;
            color: #999999 !important;
            border-color: #e5e5e5 !important;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <header>
        <h1>Tata & Pi</h1>
        <p>Escolha um dos itens abaixo para nos presentear através de nossa chave PIX direta.</p>
    </header>

    <div class="container">
        <div class="grid-presentes" id="vitrine">
            <!-- Os cards serão criados aqui pelo script -->
        </div>
    </div>

    <script>
        // Lista de presentes base com links de imagens limpas e elegantes
        const presentesIniciais = [
            { id: 1, nome: "Colher de Pau do Amor", preco: 10.00, comprado: false, img: "https://unsplash.com" },
            { id: 2, nome: "Jogo de Xícaras Moderno", preco: 30.00, comprado: false, img: "https://unsplash.com" },
            { id: 3, nome: "Conjunto de Panelas Black", preco: 150.00, comprado: false, img: "https://unsplash.com" },
            { id: 4, nome: "Batedeira Orbital", preco: 250.00, comprado: false, img: "https://unsplash.com" }
        ];

        function renderizarPresentes(lista) {
            const vitrine = document.getElementById('vitrine');
            vitrine.innerHTML = '';

            lista.forEach(item => {
                const card = document.createElement('div');
                card.className = `card ${item.comprado ? 'comprado' : ''}`;
                
                card.innerHTML = `
                    <div class="card-img-container">
                        <img src="${item.img}" alt="${item.nome}">
                    </div>
                    <div class="card-conteudo">
                        <div>
                            <h3>${item.nome}</h3>
                            <div class="preco">R$ ${item.preco.toFixed(2)}</div>
                        </div>
                        <button class="btn-comprar" ${item.comprado ? 'disabled' : ''} onclick="clicouComprar(${item.id}, '${item.nome}', ${item.preco})">
                            ${item.comprado ? 'Esgotado' : 'Presentear'}
                        </button>
                    </div>
                `;
                vitrine.appendChild(card);
            });
        }

        function clicouComprar(id, nome, preco) {
            let nomeConvidado = prompt(`Você selecionou: ${nome}.\nPor favor, digite seu nome completo para confirmação:`);
            
            if (nomeConvidado && nomeConvidado.trim() !== "") {
                alert(`Obrigado, ${nomeConvidado}!\n\nAgora realize a transferência PIX de R$ ${preco.toFixed(2)}.\n\nChave PIX: 11976861312`);
            }
        }

        renderizarPresentes(presentesIniciais);
    </script>

</body>
</html>

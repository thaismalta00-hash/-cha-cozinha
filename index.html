<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chá de Cozinha - Tata & Pi</title>
    <style>
        /* Design Minimalista Preto e Branco */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            text-align: center;
            line-height: 1.6;
            padding-bottom: 60px;
        }

        header {
            padding: 80px 20px 40px 20px;
        }
        header h1 {
            font-size: 2.5rem;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 15px;
        }
        header p {
            font-size: 1rem;
            color: #666666;
            max-width: 500px;
            margin: 0 auto;
            letter-spacing: 0.5px;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .grid-presentes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
        }

        .card {
            background: #ffffff;
            border: 1px solid #e5e5e5;
            display: flex;
            flex-direction: column;
            text-align: left;
            transition: border-color 0.2s;
        }
        .card:hover {
            border-color: #000000;
        }
        .card-conteudo {
            padding: 30px 24px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }
        .card h3 {
            font-size: 1.1rem;
            margin-bottom: 10px;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .card .preco {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .btn-comprar {
            background-color: #000000;
            color: #ffffff;
            border: 1px solid #000000;
            padding: 16px 20px;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: background 0.2s, color 0.2s;
        }
        .btn-comprar:hover {
            background-color: #ffffff;
            color: #000000;
        }

        .card.comprado { opacity: 0.4; }
        .card.comprado .btn-comprar {
            background-color: #ffffff !important;
            color: #999999 !important;
            border-color: #e5e5e5 !important;
            cursor: not-allowed;
        }

        /* Estilo da Janela Flutuante (Modal) do PIX */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background-color: #ffffff;
            padding: 40px;
            border: 1px solid #000000;
            max-width: 450px;
            width: 90%;
            text-align: center;
            position: relative;
        }
        .modal-content h2 {
            font-size: 1.5rem;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }
        .modal-content p {
            color: #555555;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }
        .pix-box {
            background-color: #f8f9fa;
            border: 1px dashed #cccccc;
            padding: 12px;
            font-size: 0.9rem;
            word-break: break-all;
            margin-bottom: 20px;
            font-family: monospace;
        }
        .btn-copiar {
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            width: 100%;
        }
        .btn-fechar {
            background: none;
            border: none;
            font-size: 1.5rem;
            position: absolute;
            top: 10px; right: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>Tata & Pi</h1>
        <p>Escolha um presente abaixo e utilize o recurso de cópia rápida para realizar o PIX direto.</p>
    </header>

    <div class="container">
        <div class="grid-presentes" id="vitrine">
            <!-- Gerado dinamicamente -->
        </div>
    </div>

    <!-- Estrutura do Modal do PIX -->
    <div id="pixModal" class="modal">
        <div class="modal-content">
            <button class="btn-fechar" onclick="fecharModal()">&times;</button>
            <h2>Finalizar Presente</h2>
            <p id="modalMsg"></p>
            <div class="pix-box" id="chavePixTexto">11976861312</div>
            <button class="btn-copiar" onclick="copiarPix()">Copiar Chave PIX</button>
        </div>
    </div>

    <script>
        const chavePixReal = "11976861312"; // Substitua aqui pela sua chave final (Celular, e-mail, etc.)

        const presentesIniciais = [
            { id: 1, nome: "Colher de Pau do Amor", preco: 10.00, comprado: false },
            { id: 2, nome: "Jogo de Xícaras Moderno", preco: 30.00, comprado: false },
            { id: 3, nome: "Conjunto de Panelas Black", preco: 150.00, comprado: false },
            { id: 4, nome: "Batedeira Orbital", preco: 250.00, comprado: false }
        ];

        function renderizarPresentes(lista) {
            const vitrine = document.getElementById('vitrine');
            vitrine.innerHTML = '';

            lista.forEach(item => {
                const card = document.createElement('div');
                card.className = `card ${item.comprado ? 'comprado' : ''}`;
                
                card.innerHTML = `
                    <div class="card-conteudo">
                        <div>
                            <h3>${item.nome}</h3>
                            <div class="preco">R$ ${item.preco.toFixed(2)}</div>
                        </div>
                        <button class="btn-comprar" ${item.comprado ? 'disabled' : ''} onclick="abrirFluxoCompra(${item.id}, '${item.nome}', ${item.preco})">
                            ${item.comprado ? 'Esgotado' : 'Presentear'}
                        </button>
                    </div>
                `;
                vitrine.appendChild(card);
            });
        }

        function abrirFluxoCompra(id, nome, preco) {
            let nomeConvidado = prompt(`Você selecionou: ${nome}.\nDigite seu nome completo para confirmar:`);
            
            if (nomeConvidado && nomeConvidado.trim() !== "") {
                // Configura o texto da janela com o valor do item escolhido
                document.getElementById('modalMsg').innerHTML = `Obrigado, <b>${nomeConvidado}</b>!<br>Para concluir o presente, clique abaixo para copiar a nossa chave e faça o pagamento de <b>R$ ${preco.toFixed(2)}</b> no seu banco.`;
                document.getElementById('pixModal').style.display = 'flex';
                
                // (Aqui faremos a gravação no Supabase posteriormente)
            }
        }

        function fecharModal() {
            document.getElementById('pixModal').style.display = 'none';
        }

        function copiarPix() {
            navigator.clipboard.writeText(chavePixReal).then(() => {
                alert("Chave PIX copiada com sucesso! Agora é só colar no aplicativo do seu banco.");
            }).catch(err => {
                alert("Erro ao copiar automaticamente. A chave é: " + chavePixReal);
            });
        }

        renderizarPresentes(presentesIniciais);
    </script>

</body>
</html>

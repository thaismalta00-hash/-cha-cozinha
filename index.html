<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chá de Cozinha - Thais & Felipe</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        /* [Resumo do CSS: Design Minimalista e Responsivo] */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background-color: #ffffff; color: #000000; text-align: center; line-height: 1.6; padding-bottom: 60px; }
        header { padding: 60px 20px 20px 20px; display: flex; flex-direction: column; align-items: center; }
        .arco-container { background-color: #000000; color: #ffffff; width: 100%; max-width: 450px; height: 550px; border-top-left-radius: 250px; border-top-right-radius: 250px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; }
        .arco-container h1, .arco-container h2 { font-family: 'Playfair Display', serif; font-size: 2.8rem; letter-spacing: 4px; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 10px; }
        
        /* 🔥 Correção Principal: 3 Colunas no Celular */
        .grid-presentes { display: grid; grid-template-columns: repeat(3, 1fr) !important; gap: 15px; }
        
        @media (max-width: 768px) {
            .grid-presentes { gap: 8px !important; }
            .card-img-container { height: 100px !important; padding: 4px !important; }
            .card h3 { font-size: 0.6rem !important; min-height: 30px !important; }
            .card .preco { font-size: 0.7rem !important; }
            .btn-comprar { padding: 6px !important; font-size: 0.6rem !important; }
        }
        
        .card { border: 1px solid #e5e5e5; text-align: left; }
        .card-img-container { height: 200px; overflow: hidden; padding: 10px; }
        .card-img-container img { width: 100%; height: 100%; object-fit: contain; }
        .card-conteudo { padding: 15px; }
        .btn-comprar { background-color: #000000; color: #ffffff; width: 100%; padding: 10px; border: none; text-transform: uppercase; }
    </style>
</head>
<body>
    <header>
        <div class="arco-container">
            <h1>Thais</h1>

        </div>
        
        <!-- TEXTO CENTRALIZADO CORRIGIDO -->
        <div style="max-width: 650px; margin: 40px auto; padding: 0 20px; text-align: center;">
            <p style="text-transform: uppercase; font-weight: 600; margin-bottom: 20px; font-family: 'Playfair Display', serif; font-size: 1.2rem;">SEJAM BEM-VINDOS AO NOSSO SITE!</p>
            <p>Montar o nosso novo lar é um momento único... (texto completo no código original)</p>
            <hr style="border: 0; border-top: 1px solid #000; margin: 30px 0;">
        </div>
    </header>

    <div class="container">

            <!-- Os itens serão gerados pelo JS -->

</html>

        /* Design Minimalista Preto e Branco */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

            color: #000000;
            text-align: center;
            line-height: 1.6;
            padding-bottom: 60px;
        }

        header {
            padding: 80px 20px 40px 20px;
        }
        header h1 {

            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 15px;
        }
        header p {
            font-size: 1rem;
            color: #666666;
            max-width: 500px;
            margin: 0 auto;
            letter-spacing: 0.5px;
        }

            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .categoria-titulo {
            font-size: 1.4rem;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 50px 0 25px 0;
            text-align: left;
            border-bottom: 1px solid #000000;
            padding-bottom: 8px;
        }

        .grid-presentes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .card {
            background: #ffffff;
            border: 1px solid #e5e5e5;
            display: flex;
            flex-direction: column;
            text-align: left;
            transition: border-color 0.2s;
        }
        .card:hover {
            border-color: #000000;
        }
        .card-conteudo {
            padding: 30px 24px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }
        .card h3 {
            font-size: 1rem;
            margin-bottom: 10px;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-height: 48px;
            display: flex;
            align-items: center;
        }
        .card .preco {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .btn-comprar {
            background-color: #000000;
            color: #ffffff;
            border: 1px solid #000000;
            padding: 16px 20px;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: background 0.2s, color 0.2s;
        }
        .btn-comprar:hover {
            background-color: #ffffff;
            color: #000000;
        }

        .card.comprado { opacity: 0.3; }
        .card.comprado .btn-comprar {
            background-color: #ffffff !important;
            color: #999999 !important;
            border-color: #e5e5e5 !important;
            cursor: not-allowed;
        }

        /* Modal do PIX */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background-color: #ffffff;
            padding: 40px;
            border: 1px solid #000000;
            max-width: 450px;
            width: 90%;
            text-align: center;
            position: relative;
        }
        .modal-content h2 {
            font-size: 1.5rem;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }
        .modal-content p {
            color: #555555;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }
        .pix-box {
            background-color: #f8f9fa;
            border: 1px dashed #cccccc;
            padding: 12px;
            font-size: 0.9rem;
            word-break: break-all;
            margin-bottom: 20px;
            font-family: monospace;
        }
        .btn-copiar {
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            width: 100%;
        }
        .btn-fechar {
            background: none;
            border: none;
            font-size: 1.5rem;
            position: absolute;
            top: 10px; right: 15px;
            cursor: pointer;
        }
    </style>
</head>

    function iniciarVitrine() {
        const containerPrincipal = document.getElementById('vitrine-principal');
        containerPrincipal.innerHTML = '';

        for (const categoria in dadosPresentes) {
            const titulo = document.createElement('h2');
            titulo.className = 'categoria-titulo';
            titulo.innerText = categoria;
            containerPrincipal.appendChild(titulo);

            const grid = document.createElement('div');
            grid.className = 'grid-presentes';

            dadosPresentes[categoria].forEach(item => {
                const card = document.createElement('div');
                card.className = "card " + (item.comprado ? 'comprado' : '');
                
                card.innerHTML = '<div class="card-conteudo"><div><h3>' + item.nome + '</h3><div class="preco">R$ ' + item.preco.toFixed(2) + '</div></div><button class="btn-comprar" ' + (item.comprado ? 'disabled' : '') + ' onclick="abrirFluxoCompra(' + item.id + ', \'' + item.nome + '\', ' + item.preco + ')">' + (item.comprado ? 'Esgotado' : 'Presentear') + '</button></div>';
                grid.appendChild(card);
            });

            containerPrincipal.appendChild(grid);
        }
    }

    function abrirFluxoCompra(id, nome, preco) {
        let nomeConvidado = prompt("Você selecionou: " + nome + ".\nDigite seu nome completo para confirmar:");
        
        if (nomeConvidado && nomeConvidado.trim() !== "") {
            document.getElementById('modalMsg').innerHTML = "Obrigado, <b>" + nomeConvidado + "</b>!<br>Para concluir o presente, clique abaixo para copiar a nossa chave e faça o pagamento de <b>R$ " + preco.toFixed(2) + "</b> no seu banco.";
            document.getElementById('pixModal').style.display = 'flex';
        }
    }

    function fecharModal() {
        document.getElementById('pixModal').style.display = 'none';
    }

    function copiarPix() {
        navigator.clipboard.writeText(chavePixReal).then(() => {
            alert("Chave PIX copiada com sucesso! Agora é só colar no aplicativo do seu banco.");
        }).catch(err => {
            alert("Erro ao copiar. A chave é: " + chavePixReal);
        });
    }

    iniciarVitrine();
</script>

</html>
